<div class="-mb-px text-eh-surface/40">{% include "wave.html" %}</div>
<section
  id="palette"
  class="scroll-mt-24 bg-eh-surface/40 py-16 lg:py-24"
  x-data="{
    copied: null,
    accents: [
      { name: 'Red',    dark: '#f7768e', day: '#f52a65' },
      { name: 'Orange', dark: '#ffd1ad', day: '#f0633c' },
      { name: 'Yellow', dark: '#ffecb8', day: '#df8e1d' },
      { name: 'Green',  dark: '#58ffc7', day: '#10a877' },
      { name: 'Cyan',   dark: '#5ce1ff', day: '#0a9fbf' },
      { name: 'Blue',   dark: '#82aaff', day: '#366ff0' },
      { name: 'Purple', dark: '#d2a6ef', day: '#8b4fe0' },
      { name: 'Pink',   dark: '#f4a8d8', day: '#e62b86' },
    ],
    neutrals: [
      { name: 'Background', dark: '#24283b', day: '#eef0f5' },
      { name: 'Surface',    dark: '#1f2233', day: '#e4e7ee' },
      { name: 'Foreground', dark: '#a8b5d1', day: '#2f3b54' },
      { name: 'Bright',     dark: '#c6cfe1', day: '#1f2733' },
      { name: 'Comment',    dark: '#7586b3', day: '#7b88a8' },
      { name: 'Selection',  dark: '#2b3355', day: '#d6def5' },
    ],
    hex(c) { return $store.theme.isDay ? c.day : c.dark },
    copy(c) {
      navigator.clipboard.writeText(this.hex(c));
      this.copied = c.name;
      setTimeout(() => { if (this.copied === c.name) this.copied = null }, 1200);
    }
  }"
>
  <div class="mx-auto w-full max-w-7xl px-6 lg:px-12">
  <h2 class="text-3xl font-bold tracking-tight text-eh-text-bright lg:text-4xl">Palette</h2>
  <p class="mt-3 max-w-2xl text-eh-muted">Click any swatch to copy its hex for the current theme.</p>

  <h3 class="mb-6 mt-10 font-mono font-bold text-base uppercase tracking-widest text-eh-muted">Accents</h3>
  <div class="grid grid-cols-2 gap-5 sm:grid-cols-3 lg:grid-cols-4">
    <template x-for="c in accents" :key="c.name">
      <button @click="copy(c)" class="group text-left">
        <div class="h-20 rounded-xl ring-1 ring-inset ring-eh-border/60 transition-transform duration-200 group-hover:-translate-y-1" :style="`background-color:${hex(c)}`"></div>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-sm font-medium text-eh-text-bright" x-text="c.name"></span>
          <span class="font-mono text-xs lowercase text-eh-muted transition-colors group-hover:text-eh-text" x-text="copied === c.name ? 'copied!' : hex(c)"></span>
        </div>
      </button>
    </template>
  </div>

  <h3 class="mb-6 mt-12 font-mono font-bold text-base uppercase tracking-widest text-eh-muted">Neutrals</h3>
  <div class="grid grid-cols-2 gap-5 sm:grid-cols-3 lg:grid-cols-4">
    <template x-for="c in neutrals" :key="c.name">
      <button @click="copy(c)" class="group text-left">
        <div class="h-20 rounded-xl ring-1 ring-inset ring-eh-border/60 transition-transform duration-200 group-hover:-translate-y-1" :style="`background-color:${hex(c)}`"></div>
        <div class="mt-3 flex items-center justify-between">
          <span class="text-sm font-medium text-eh-text-bright" x-text="c.name"></span>
          <span class="font-mono text-xs lowercase text-eh-muted transition-colors group-hover:text-eh-text" x-text="copied === c.name ? 'copied!' : hex(c)"></span>
        </div>
      </button>
    </template>
  </div>
  </div>
</section>
