<header class="sticky top-0 z-50 border-b border-eh-border/60 bg-eh-bg/80 backdrop-blur-md">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-6 px-6 py-4 lg:px-12">
    <a href="/" class="flex items-center gap-3 text-eh-text-bright">
      <span class="h-8 w-8 md:h-9 md:w-9">
        {% include "logo.svg" %}
      </span>
      <span class="text-lg font-bold tracking-tight md:text-xl">Electron Highlighter</span>
    </a>
    <nav class="flex items-center gap-5 font-mono text-sm font-medium md:gap-7">
      <a href="#palette" class="hidden text-eh-muted transition-colors hover:text-eh-blue focus-visible:text-eh-blue sm:inline">Palette</a>
      <a href="#ports" class="hidden text-eh-muted transition-colors hover:text-eh-blue focus-visible:text-eh-blue sm:inline">Ports</a>
      <a href="#examples" class="hidden text-eh-muted transition-colors hover:text-eh-blue focus-visible:text-eh-blue sm:inline">Examples</a>
      <a href="https://github.com/electron-highlighter" target="_blank" rel="noopener" aria-label="GitHub" class="text-eh-muted transition-colors hover:text-eh-blue focus-visible:text-eh-blue">
        <span class="inline-flex h-5 w-5">{% include "github.svg" %}</span>
      </a>
      <button
        x-data
        @click="$store.theme.toggle()"
        :aria-label="$store.theme.isDay ? 'Switch to dark theme' : 'Switch to light theme'"
        class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-eh-border bg-eh-surface text-eh-muted transition-colors hover:text-eh-text-bright"
      >
        <span x-show="!$store.theme.isDay" class="h-5 w-5">{% include "sun.svg" %}</span>
        <span x-show="$store.theme.isDay" class="h-5 w-5" x-cloak>{% include "moon.svg" %}</span>
      </button>
    </nav>
  </div>
</header>
