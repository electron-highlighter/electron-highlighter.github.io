<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      {{title}}
    </title>
    {% if description %}
      <meta name="description" content="{{description}}"/>
    {% endif %}
    {% block head %}{% endblock %}
    <link rel="icon" href="/favicon.png" type="image/png">
    <!-- Set the theme before paint to avoid a flash. Defaults to dark. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "day" && t !== "dark") t = "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/static/css/style.css"/>
    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.store("theme", {
          current: document.documentElement.getAttribute("data-theme") || "dark",
          get isDay() {
            return this.current === "day";
          },
          toggle() {
            this.current = this.current === "dark" ? "day" : "dark";
            document.documentElement.setAttribute("data-theme", this.current);
            try {
              localStorage.setItem("theme", this.current);
            } catch (e) {}
          },
        });
      });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="min-h-screen flex flex-col bg-eh-bg text-eh-text font-sans overflow-x-hidden antialiased">
    {% include "header.html" %}

    <main class="flex-1 w-full">
      {{ content | safe }}
    </main>

    {% include "footer.html" %}
  </body>
</html>
